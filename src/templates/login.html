{% extends "base.html" %}

{% block content %}
    <div class="container-fluid mt-2">
        <div class="row">
            <div class="col-sm-4 p-5 text-white">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 mt-3">
                        <label class="form-check-label">{{ form.username.label }}</label>
                        <input type="text" class="form-control" id="id_username" name="username">
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-check-label">{{ form.password.label }}</label>
                        <input type="password" class="form-control" id="id_password" name="password">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                {% if form.errors %}
                    <p style="color: red;">Your username and password didn't match. Please try again.</p>
                {% endif %}
            </div>
        </div>
    </div>
{% endblock %}
